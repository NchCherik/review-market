<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps | ReviewMarket</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f9fafb; 
        }
        .font-black { font-weight: 900; }
        
        .package-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .package-card.active {
            border-color: #6366f1;
            background-color: #f5f3ff;
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center transition-transform group-hover:scale-110">
                    <span class="text-white font-black text-xl italic">R</span>
                </div>
                <h1 class="font-black text-xl tracking-tighter uppercase italic">ReviewMarket</h1>
            </a>
            
            <div class="flex items-center gap-4">
                <div id="balance-display" class="font-black text-indigo-600 bg-indigo-50 px-5 py-2 rounded-full border border-indigo-100 text-sm shadow-sm">
                    Завантаження...
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-black mb-4 uppercase italic tracking-tighter">
                Google <span class="text-indigo-600">Maps</span>
            </h2>
            <p class="text-gray-400 font-bold uppercase text-[11px] tracking-[0.3em]">Відгуки по 30 ₴ за штуку</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div id="pkg-1" onclick="selectPackage('pkg-1', 1, '1 відгук')" class="package-card active p-8 bg-white border-2 border-gray-100 rounded-[40px] cursor-pointer text-center">
                <div class="text-3xl font-black mb-2 italic">30 ₴</div>
                <div class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">1 ВІДГУК</div>
            </div>

            <div id="pkg-2" onclick="selectPackage('pkg-2', 5, '5 відгуків')" class="package-card p-8 bg-white border-2 border-gray-100 rounded-[40px] cursor-pointer text-center">
                <div class="text-3xl font-black mb-2 italic">150 ₴</div>
                <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">5 ВІДГУКІВ</div>
            </div>

            <div id="pkg-3" onclick="selectPackage('pkg-3', 10, '10 відгуків')" class="package-card p-8 bg-white border-2 border-gray-100 rounded-[40px] cursor-pointer text-center">
                <div class="text-3xl font-black mb-2 italic">300 ₴</div>
                <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">10 ВІДГУКІВ</div>
            </div>
        </div>

        <div class="bg-white p-10 rounded-[50px] border border-gray-100 shadow-xl shadow-gray-100/50">
            <div class="grid grid-cols-1 gap-8">
                
                <div class="relative">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-4">Посилання на локацію</label>
                    <input type="text" id="target-link" placeholder="Вставте лінк на карти..." class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-semibold">
                </div>

                <div class="relative">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-4">Текст для відгуків</label>
                    <textarea id="order-details" rows="4" placeholder="Що мають написати люди?" class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-semibold"></textarea>
                </div>

                <div class="relative">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-4">Ваш Telegram (@username)</label>
                    <input type="text" id="user-contact" placeholder="@username" class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-semibold">
                </div>

                <button onclick="submitOrder()" class="w-full bg-black text-white py-6 rounded-3xl font-black uppercase italic tracking-[0.2em] text-sm hover:bg-gray-800 transition-all shadow-2xl shadow-gray-300">
                    Оформити за <span id="price-tag">30</span> ₴
                </button>

            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";
        const PRICE_PER_ONE = 30; // Новая цена
        let selectedPrice = 30;
        let selectedPackageName = "1 відгук";

        function selectPackage(elementId, count, name) {
            document.querySelectorAll('.package-card').forEach(card => {
                card.classList.remove('active');
                card.querySelector('.text-indigo-500')?.classList.replace('text-indigo-500', 'text-gray-400');
            });

            const activeCard = document.getElementById(elementId);
            activeCard.classList.add('active');
            activeCard.querySelector('.text-gray-400').classList.replace('text-gray-400', 'text-indigo-500');

            selectedPrice = count * PRICE_PER_ONE;
            selectedPackageName = name;
            document.getElementById('price-tag').innerText = selectedPrice;
        }

        async function submitOrder() {
            const userData = JSON.parse(localStorage.getItem('rm_user'));
            if(!userData) return alert("Авторизуйтесь!");

            const payload = {
                user_email: userData.email,
                price: selectedPrice,
                package: selectedPackageName,
                type: "Google Maps",
                target: document.getElementById('target-link').value,
                details: document.getElementById('order-details').value,
                contact: document.getElementById('user-contact').value
            };

            if(!payload.target || !payload.contact) return alert("Заповніть поля!");

            const response = await fetch(`${API_URL}/order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if(result.success) {
                alert("Готово!");
                window.location.href = "index.html";
            } else {
                alert(result.error);
            }
        }

        window.onload = async () => {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(user) {
                const res = await fetch(`${API_URL}/get_balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email })
                });
                const data = await res.json();
                document.getElementById('balance-display').innerText = (data.balance || 0) + " ₴";
            }
        };
    </script>
</body>
</html>
