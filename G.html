<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps | ReviewMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f9fafb; }
        .font-black { font-weight: 900; }
        .package-card.active { border-color: #6366f1; background: #f5f3ff; transform: scale(1.02); }
    </style>
</head>
<body class="text-gray-900">
    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center"><span class="text-white font-black text-xl italic">R</span></div>
                <h1 class="font-black text-xl tracking-tighter uppercase italic">ReviewMarket</h1>
            </a>
            <div id="balance-display" class="font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100 text-sm">0 ₴</div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-12">
        <h2 class="text-4xl font-black mb-10 uppercase italic tracking-tighter text-center">Google <span class="text-indigo-600">Maps</span></h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div onclick="selectPkg(this, 150, '1 відгук')" class="package-card active p-6 bg-white border-2 border-gray-100 rounded-[30px] cursor-pointer transition-all text-center">
                <div class="text-2xl font-black mb-1 italic">150 ₴</div>
                <div class="text-[10px] font-bold text-gray-400 uppercase">Lite пакет</div>
            </div>
            <div onclick="selectPkg(this, 700, '5 відгуків')" class="package-card p-6 bg-white border-2 border-gray-100 rounded-[30px] cursor-pointer transition-all text-center">
                <div class="text-2xl font-black mb-1 italic">700 ₴</div>
                <div class="text-[10px] font-bold text-gray-400 uppercase">Standard пакет</div>
            </div>
            <div onclick="selectPkg(this, 1300, '10 відгуків')" class="package-card p-6 bg-white border-2 border-gray-100 rounded-[30px] cursor-pointer transition-all text-center">
                <div class="text-2xl font-black mb-1 italic">1300 ₴</div>
                <div class="text-[10px] font-bold text-gray-400 uppercase">Pro пакет</div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[40px] border border-gray-100 shadow-sm space-y-6">
            <input type="text" id="target" placeholder="Посилання на заклад в Maps" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
            <textarea id="details" rows="3" placeholder="Ваші побажання до тексту відгуків..." class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium"></textarea>
            <input type="text" id="contact" placeholder="Ваш Telegram @username" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
            <button onclick="send()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase italic tracking-widest hover:bg-gray-800 transition-all">Замовити за <span id="btn-p">150</span> ₴</button>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";
        let selPrice = 150, selPkg = "1 відгук";
        function selectPkg(el, p, n) {
            document.querySelectorAll('.package-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); selPrice = p; selPkg = n;
            document.getElementById('btn-p').innerText = p;
        }
        async function send() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(!user) return alert("Увійдіть на головній!");
            const res = await fetch(`${API_URL}/order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_email: user.email, package: selPkg, price: selPrice, type: "Google Maps", target: document.getElementById('target').value, details: document.getElementById('details').value, contact: document.getElementById('contact').value })
            });
            const data = await res.json();
            if(data.success) { alert("Успішно!"); location.href="index.html"; } else alert(data.error);
        }
        window.onload = async () => {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(user) {
                const res = await fetch(`${API_URL}/get_balance`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: user.email}) });
                const data = await res.json(); document.getElementById('balance-display').innerText = (data.balance || 0) + " ₴";
            }
        }
    </script>
</body>
</html>
