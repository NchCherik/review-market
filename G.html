<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps | ReputKo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
        .font-black { font-weight: 900; }
        
        /* Стили ползунка */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #e5e7eb; border-radius: 20px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #6366f1; cursor: pointer; margin-top: -8px; border: 3px solid white; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); }

        /* Стиль активного тарифа */
        .tab-active { background: #6366f1 !important; color: white !important; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
            <a href="index.html" class="flex items-center gap-2 shrink-0 group">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center transition-transform group-hover:scale-110">
                    <span class="text-white font-black text-xl italic">R</span>
                </div>
                <h1 class="font-black text-sm md:text-xl tracking-tighter uppercase italic">ReputKo</h1>
            </a>
            <div id="balance-display" class="font-black text-indigo-600 bg-indigo-50 px-5 py-2 rounded-full border border-indigo-100 text-xs md:text-sm shadow-sm shrink-0">0 ₴</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 md:py-12">
        <div class="text-center mb-10">
            <h2 class="text-4xl md:text-7xl font-black mb-2 uppercase italic tracking-tighter">
                Google <span class="text-indigo-600">Maps</span>
            </h2>
            <p id="rate-text" class="text-gray-400 font-bold uppercase text-[10px] tracking-[0.3em]">Ціна за 1 відгук: 100 ₴</p>
        </div>

        <div class="max-w-4xl mx-auto mb-10">
            <div class="flex flex-col md:flex-row bg-white p-2 rounded-[30px] border border-gray-100 shadow-sm gap-2">
                <button onclick="setPlan(100, 'Звичайний', this)" class="tab-btn tab-active flex-1 py-4 px-4 rounded-[25px] transition-all text-center">
                    <span class="block font-black text-[11px] uppercase italic">Звичайний</span>
                    <span class="block text-[9px] opacity-70 font-bold">100₴ • 1-2 дні • Без тексту</span>
                </button>
                <button onclick="setPlan(130, 'З текстом', this)" class="tab-btn bg-gray-50 flex-1 py-4 px-4 rounded-[25px] transition-all text-center text-gray-400">
                    <span class="block font-black text-[11px] uppercase italic">З текстом</span>
                    <span class="block text-[9px] opacity-70 font-bold">130₴ • 1-2 дні • Пріоритет</span>
                </button>
                <button onclick="setPlan(175, 'Люкс', this)" class="tab-btn bg-gray-50 flex-1 py-4 px-4 rounded-[25px] transition-all text-center text-gray-400">
                    <span class="block font-black text-[11px] uppercase italic">Люкс</span>
                    <span class="block text-[9px] opacity-70 font-bold">160₴ • 1 день • Живі відгуки • Різноманітність</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-10 items-start">
            <div class="bg-white p-8 md:p-12 rounded-[40px] md:rounded-[55px] border border-gray-100 shadow-xl h-full flex flex-col justify-center">
                <div class="space-y-8">
                    <div class="flex flex-col gap-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Кількість відгуків</label>
                        <input type="number" id="count-input" value="10" min="1" oninput="updateByCount()" class="w-full bg-gray-50 border border-gray-100 p-6 rounded-[30px] focus:ring-4 focus:ring-indigo-500/10 outline-none font-black text-3xl text-indigo-600 transition-all">
                    </div>

                    <div class="flex flex-col gap-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-4">Загальна сума (₴)</label>
                        <input type="number" id="price-input" value="1000" oninput="updateByPrice()" class="w-full bg-gray-50 border border-gray-100 p-6 rounded-[30px] focus:ring-4 focus:ring-indigo-500/10 outline-none font-black text-3xl transition-all">
                    </div>

                    <div class="pt-6 px-2">
                        <input type="range" id="range-slider" min="1" max="100" step="1" value="10" oninput="updateBySlider()" class="cursor-pointer">
                        <div class="flex justify-between mt-4 text-[9px] font-black text-gray-300 uppercase tracking-widest">
                            <span>1 відгук</span>
                            <span>100 відгуків</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 md:p-12 rounded-[40px] md:rounded-[55px] border border-gray-100 shadow-sm space-y-7">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-4">Посилання на локацію</label>
                    <input type="text" id="target-link" placeholder="google.com/maps/..." class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl outline-none transition-all font-semibold">
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-4">Текст для відгуків / Побажання</label>
                    <textarea id="order-details" rows="4" placeholder="Напишіть ваші побажання або тексти..." class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl outline-none transition-all font-semibold"></textarea>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-4">Telegram для зв'язку</label>
                    <input type="text" id="user-contact" placeholder="@username" class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl outline-none transition-all font-semibold">
                </div>

                <button onclick="submitOrder()" class="w-full bg-black text-white py-6 md:py-8 rounded-[30px] font-black uppercase italic tracking-[0.2em] text-xs md:text-sm hover:bg-gray-800 active:scale-95 transition-all shadow-2xl shadow-gray-200">
                    Замовити за <span id="btn-price">1000</span> ₴
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";
        let CURRENT_RATE = 100;
        let CURRENT_PLAN = "Звичайний";

        const countInput = document.getElementById('count-input');
        const priceInput = document.getElementById('price-input');
        const rangeSlider = document.getElementById('range-slider');
        const btnPrice = document.getElementById('btn-price');
        const rateText = document.getElementById('rate-text');

        // Смена тарифа
        function setPlan(rate, name, element) {
            CURRENT_RATE = rate;
            CURRENT_PLAN = name;
            
            // Визуальное переключение кнопок
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('bg-gray-50', 'text-gray-400');
            });
            element.classList.add('tab-active');
            element.classList.remove('bg-gray-50', 'text-gray-400');

            rateText.innerText = `Ціна за 1 відгук: ${rate} ₴`;
            updateByCount(); // Пересчитываем сумму под новый тариф
        }

        function updateByCount() {
            let count = parseInt(countInput.value) || 0;
            const price = count * CURRENT_RATE;
            priceInput.value = price;
            rangeSlider.value = count;
            btnPrice.innerText = price;
        }

        function updateByPrice() {
            const price = parseFloat(priceInput.value) || 0;
            const count = Math.floor(price / CURRENT_RATE);
            countInput.value = count;
            rangeSlider.value = count;
            btnPrice.innerText = price;
        }

        function updateBySlider() {
            countInput.value = rangeSlider.value;
            updateByCount();
        }

        async function submitOrder() {
            const userData = JSON.parse(localStorage.getItem('rm_user'));
            const targetLink = document.getElementById('target-link').value;
            const userContact = document.getElementById('user-contact').value;
            
            if(!userData) return alert("Авторизуйтесь!");
            if(!targetLink.includes('.')) return alert("Вкажіть посилання!");
            if(!userContact.includes('@')) return alert("Вкажіть Telegram @");

            const payload = {
                user_email: userData.email,
                price: parseFloat(priceInput.value),
                package: `${countInput.value} відгуків [${CURRENT_PLAN}]`,
                type: "Google Maps",
                target: targetLink,
                details: document.getElementById('order-details').value,
                contact: userContact
            };

            try {
                const res = await fetch(`${API_URL}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if(result.success) {
                    alert("Успішно!");
                    window.location.href = "index.html";
                } else { alert(result.error); }
            } catch (e) { alert("Помилка з'єднання"); }
        }

        window.onload = async () => {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(user) {
                const res = await fetch(`${API_URL}/get_balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email })
                });
                const data = await res.json();
                document.getElementById('balance-display').innerText = (data.balance || 0) + " ₴";
            }
        };
    </script>
</body>
</html>
