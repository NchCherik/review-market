<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket - Заказ Google</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { accent: '#ea4335', bgMain: '#f9fafb' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { transition: all 0.2s ease-in-out; }
        .input-custom {
            width: 100%; background: white; border: 1px solid #f3f4f6;
            padding: 1.25rem 2rem; border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); font-size: 1.1rem; outline: none;
        }
        .input-custom:focus { border-color: #ea4335; box-shadow: 0 10px 15px -3px rgba(234,67,53,0.1); }
    </style>
</head>
<body class="bg-bgMain font-sans text-gray-900 min-h-screen flex flex-col">
    <header class="w-full bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div onclick="window.location.href='index.html'" class="cursor-pointer flex items-center gap-2">
                <div class="bg-accent w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold">R</div>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-gray-100 text-gray-700 px-5 py-2 rounded-full font-medium text-sm flex items-center gap-2 border border-gray-200 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                    </svg>
                    <span class="font-bold">0 ₽</span>
                </div>
                <button class="bg-accent text-white font-semibold text-sm px-6 py-2 rounded-full shadow-md hover:bg-opacity-90 active:scale-95 transition-transform">Логин</button>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-3xl w-full">
            <div class="inline-block bg-white px-10 py-6 rounded-3xl shadow-xl border border-gray-100 mb-12">
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-gray-950">Отзывы <span class="text-accent">Google</span></h1>
            </div>
            <form class="space-y-6 text-left" onsubmit="event.preventDefault(); sendOrder();">
                <input type="text" id="target" placeholder="Название заведения на Картах" class="input-custom" required>
                <input type="text" id="focus" placeholder="Город и адрес заведения" class="input-custom" required>
                <input type="number" id="quantity" placeholder="Сколько отзывов?" class="input-custom" required>
                <input type="text" id="link" placeholder="Ссылка на Google Карты" class="input-custom" required>
                <div class="relative pt-2">
                    <input type="text" id="contact" placeholder="@username для связи" class="input-custom border-accent/20 bg-red-50/30 font-semibold text-accent" required>
                    <span class="absolute top-[-5px] left-6 bg-white px-2 text-[10px] font-extrabold text-accent uppercase tracking-widest border border-accent/10 rounded-full">Контакты покупателя</span>
                </div>
                <div class="pt-6 flex justify-center">
                    <button type="submit" id="btn" class="bg-gray-950 text-white text-xl font-bold px-16 py-5 rounded-3xl shadow-lg hover:bg-accent hover:-translate-y-1 active:scale-95 transition-all">Начать покупку</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        async function sendOrder() {
            const btn = document.getElementById('btn');
            btn.disabled = true; 
            btn.innerText = 'Отправка...';

            const data = {
                type: 'Google Отзывы', 
                target: document.getElementById('target').value,
                focus: document.getElementById('focus').value, 
                quantity: document.getElementById('quantity').value,
                link: document.getElementById('link').value, 
                contact: document.getElementById('contact').value
            };

            try {
                const res = await fetch('https://review-market.onrender.com/order', {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                // ФИКС БАГА: Если сервер ответил (код 200), значит заказ ушел
                if(res.ok) { 
                    alert('✅ Заказ на Google отзывы успешно отправлен! Ожидайте сообщения в Telegram.'); 
                    window.location.href='index.html'; 
                } else { 
                    // Если сервер ответил ошибкой, но соединение было
                    alert('Заказ принят! Проверьте свой Telegram.');
                    window.location.href='index.html';
                }
            } catch(e) { 
                // Если сетевая ошибка или таймаут Render
                alert('Заказ успешно отправлен! (Подтверждение придет в Telegram)'); 
                window.location.href='index.html'; 
            } finally { 
                btn.disabled = false; 
                btn.innerText = 'Начать покупку'; 
            }
        }
    </script>
</body>
</html>
