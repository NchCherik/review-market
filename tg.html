<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket | Telegram Замовлення</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f9fafb; }
        .font-black { font-weight: 900; }
    </style>
</head>
<body class="text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-xl italic">R</span>
                </div>
                <h1 class="font-black text-xl tracking-tighter uppercase italic">ReviewMarket</h1>
            </a>
            <div class="flex items-center bg-gray-50 px-4 py-2 rounded-full border border-gray-200">
                <span id="user-balance" class="font-black text-sm text-indigo-600">Завантаження...</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-100">
            <h2 class="text-3xl font-black mb-6 uppercase italic tracking-tighter">Замовлення: Telegram</h2>
            
            <form id="orderForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-2">Оберіть пакет</label>
                    <select id="package" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all appearance-none" onchange="updatePrice()">
                        <option value="50">10 відгуків — 50 ₴</option>
                        <option value="100">25 відгуків — 100 ₴</option>
                        <option value="250">70 відгуків — 250 ₴</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-2">Посилання на канал</label>
                    <input type="text" id="target" placeholder="https://t.me/..." class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" required>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 ml-2">Ваш Telegram для зв'язку</label>
                    <input type="text" id="contact" placeholder="@username" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" required>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase italic tracking-widest hover:bg-gray-800 transition-all shadow-lg shadow-gray-200 disabled:opacity-50">
                    Оплатити та замовити
                </button>
            </form>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com"; // Твій URL на Render
        let user = JSON.parse(localStorage.getItem('rm_user'));

        async function checkAccess() {
            if(!user) {
                alert("Будь ласка, увійдіть через Google на головній сторінці!");
                window.location.href = "index.html";
                return;
            }
            await getBalance();
        }

        async function getBalance() {
            try {
                const res = await fetch(`${API_URL}/get_balance`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: user.email })
                });
                const data = await res.json();
                user.balance = data.balance;
                document.getElementById('user-balance').innerText = data.balance + " ₴";
                updatePrice();
            } catch (e) { console.error("Помилка балансу"); }
        }

        function updatePrice() {
            const price = parseInt(document.getElementById('package').value);
            const btn = document.getElementById('submitBtn');
            
            if(user.balance < price) {
                btn.innerText = `Недостатньо коштів (${price} ₴)`;
                btn.disabled = true;
                btn.classList.add('bg-red-500');
                btn.classList.remove('bg-black');
            } else {
                btn.innerText = `Оплатити ${price} ₴`;
                btn.disabled = false;
                btn.classList.remove('bg-red-500');
                btn.classList.add('bg-black');
            }
        }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Обробка...";
            btn.disabled = true;

            const orderData = {
                user_email: user.email,
                user_info: user.name,
                type: "Telegram",
                target: document.getElementById('target').value,
                quantity: document.getElementById('package').options[document.getElementById('package').selectedIndex].text,
                contact: document.getElementById('contact').value
            };

            try {
                const res = await fetch(`${API_URL}/order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });
                const result = await res.json();

                if(result.success) {
                    alert("Замовлення успішно прийнято! Гроші списано.");
                    window.location.href = "index.html";
                } else {
                    alert("Помилка: " + result.error);
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Сервер не відповідає");
                btn.disabled = false;
            }
        };

        checkAccess();
    </script>
</body>
</html>
