<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket - Отзывы Telegram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { accent: '#0088cc', bgMain: '#f9fafb' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { transition: all 0.2s ease-in-out; }
        .input-custom {
            width: 100%; background: white; border: 1px solid #f3f4f6;
            padding: 1.25rem 2rem; border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); font-size: 1.1rem; outline: none;
        }
        .input-custom:focus { border-color: #0088cc; box-shadow: 0 10px 15px -3px rgba(0,136,204,0.1); }
    </style>
</head>
<body class="bg-bgMain font-sans text-gray-900 min-h-screen flex flex-col">
    <header class="w-full bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div onclick="window.location.href='index.html'" class="cursor-pointer flex items-center gap-2">
                <div class="bg-accent w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold">R</div>
                <span class="font-bold text-gray-900">ReviewMarket</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-gray-100 text-gray-700 px-5 py-2 rounded-full font-medium text-sm flex items-center gap-2 border border-gray-200 shadow-inner">
                    <span id="user-balance" class="font-bold">0 ₽</span>
                </div>
                <div id="auth-section">
                    <div id="g_id_onload" data-client_id="870765995654-qp38thfph22ubnjgknabmnd3dusgueij.apps.googleusercontent.com" data-callback="onGoogleAuth"></div>
                    <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-3xl w-full">
            <div class="inline-block bg-white px-10 py-6 rounded-3xl shadow-xl border border-gray-100 mb-12">
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-gray-950">Отзывы <span class="text-accent">Telegram</span></h1>
            </div>
            
            <form class="space-y-6 text-left" onsubmit="event.preventDefault(); sendOrder();">
                <input type="text" id="target" placeholder="Ссылка (например: t.me/название)" class="input-custom" required>
                <input type="text" id="focus" placeholder="Тематика отзывов (Живые/Положительные)" class="input-custom" required>
                <input type="number" id="quantity" placeholder="Количество отзывов (мин. 5)" class="input-custom" required>
                <input type="text" id="link" placeholder="Ссылка на пост (если нужно)" class="input-custom">
                
                <div class="relative pt-2">
                    <input type="text" id="contact" placeholder="@username для связи" class="input-custom border-accent/20 bg-blue-50/30 font-semibold text-accent" required>
                    <span id="contact-label" class="absolute top-[-5px] left-6 bg-white px-2 text-[10px] font-extrabold text-accent uppercase tracking-widest border border-accent/10 rounded-full">Контакты покупателя</span>
                </div>

                <div class="pt-6 flex justify-center">
                    <button type="submit" id="btn" class="bg-gray-950 text-white text-xl font-bold px-16 py-5 rounded-3xl shadow-lg hover:bg-accent hover:-translate-y-1 active:scale-95 transition-all">Заказать отзывы</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function onGoogleAuth(response) {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const user = JSON.parse(window.atob(base64));
            localStorage.setItem('rm_user', JSON.stringify({name: user.name, email: user.email, picture: user.picture}));
            renderUser();
        }

        function renderUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(user) {
                document.getElementById('auth-section').innerHTML = `
                    <div class="flex items-center gap-2 bg-white border border-gray-200 px-3 py-1 rounded-full shadow-sm">
                        <img src="${user.picture}" class="w-6 h-6 rounded-full">
                        <span class="font-bold text-xs">${user.name.split(' ')[0]}</span>
                        <button onclick="localStorage.removeItem('rm_user'); location.reload();" class="text-[10px] text-red-400 font-bold ml-1">ВЫХОД</button>
                    </div>`;
                document.getElementById('contact-label').innerText = `ВХОД: ${user.name.split(' ')[0]}`;
                if(!document.getElementById('contact').value) document.getElementById('contact').value = user.name;
            }
        }

        async function sendOrder() {
            const btn = document.getElementById('btn');
            const target = document.getElementById('target').value;
            const qty = parseInt(document.getElementById('quantity').value);
            
            // Новая проверка ссылки (должна быть точка)
            const urlPattern = /^[^\s]+\.[^\s]{2,}$/;
            if (!urlPattern.test(target)) {
                alert('Введите корректную ссылку с точкой (например: t.me/канал или site.com)');
                return;
            }
            if (qty < 5 || isNaN(qty)) { alert('Минимальный заказ — 5 отзывов!'); return; }

            btn.disabled = true; btn.innerText = 'Отправка...';
            const user = JSON.parse(localStorage.getItem('rm_user'));

            const data = {
                type: 'Telegram Отзывы', 
                target: target,
                focus: document.getElementById('focus').value, 
                quantity: qty,
                link: document.getElementById('link').value, 
                contact: document.getElementById('contact').value,
                user_info: user ? `${user.name} (${user.email})` : 'Аноним'
            };

            try {
                await fetch('https://review-market.onrender.com/order', {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                alert('✅ Заказ успешно отправлен!');
                window.location.href='index.html';
            } catch(e) {
                alert('Заказ отправлен! Проверьте Telegram.');
                window.location.href='index.html';
            } finally {
                btn.disabled = false; btn.innerText = 'Заказать отзывы';
            }
        }
        window.onload = renderUser;
    </script>
</body>
</html>
