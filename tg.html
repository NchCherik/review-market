<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Boost | ReviewMarket</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f0f4f8; 
        }
        .font-black { font-weight: 900; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-xl italic">R</span>
                </div>
                <h1 class="font-black text-xl tracking-tighter uppercase italic">ReviewMarket</h1>
            </a>
            
            <div id="balance-display" class="font-black text-blue-600 bg-blue-50 px-5 py-2 rounded-full border border-blue-100 text-sm">
                0 ₴
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h2 class="text-5xl font-black mb-2 uppercase italic tracking-tighter text-blue-600">
                Telegram <span class="text-black">Boost</span>
            </h2>
            <p class="text-gray-400 font-bold uppercase text-[10px] tracking-[0.3em]">Ціна за 1 відгук: 32.5 ₴</p>
        </div>

        <div class="bg-white p-8 rounded-[40px] border border-gray-100 shadow-xl mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div class="space-y-3">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 ml-2">Відгуки</label>
                    <input type="number" id="count-input" value="10" oninput="updateByCount()" class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl focus:ring-4 focus:ring-blue-500/10 outline-none font-black text-2xl text-blue-600">
                </div>

                <div class="space-y-3">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 ml-2">Сума (₴)</label>
                    <input type="number" id="price-input" value="325" oninput="updateByPrice()" class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl focus:ring-4 focus:ring-blue-500/10 outline-none font-black text-2xl">
                </div>
            </div>

            <div class="mt-8">
                <input type="range" id="range-slider" min="1" max="1000" step="1" value="10" oninput="updateBySlider()" class="cursor-pointer">
            </div>
        </div>

        <div class="bg-white p-8 rounded-[40px] border border-gray-100 shadow-sm space-y-6">
            <input type="text" id="target-link" placeholder="Посилання на канал" class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl focus:ring-2 focus:ring-blue-500 outline-none font-semibold">
            <input type="text" id="user-contact" placeholder="Ваш Telegram @username" class="w-full bg-gray-50 border border-gray-100 p-5 rounded-3xl focus:ring-2 focus:ring-blue-500 outline-none font-semibold">
            <button onclick="submitOrder()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black uppercase italic tracking-[0.2em] text-sm hover:bg-blue-700 transition-all">
                Оформити замовлення
            </button>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";
        const RATE = 32.5; // Твоя новая цена

        const countInput = document.getElementById('count-input');
        const priceInput = document.getElementById('price-input');
        const rangeSlider = document.getElementById('range-slider');

        function updateByCount() {
            const count = parseInt(countInput.value) || 0;
            const price = count * RATE;
            priceInput.value = price;
            rangeSlider.value = count;
        }

        function updateByPrice() {
            const price = parseFloat(priceInput.value) || 0;
            const count = Math.floor(price / RATE);
            countInput.value = count;
            rangeSlider.value = count;
        }

        function updateBySlider() {
            countInput.value = rangeSlider.value;
            updateByCount();
        }

        async function submitOrder() {
            const userData = JSON.parse(localStorage.getItem('rm_user'));
            if(!userData) return alert("Увійдіть!");

            const payload = {
                user_email: userData.email,
                price: parseFloat(priceInput.value),
                package: countInput.value + " підписників",
                type: "Telegram Boost",
                target: document.getElementById('target-link').value,
                contact: document.getElementById('user-contact').value,
                details: "Ціна 32.5/од"
            };

            if(!payload.target || !payload.contact) return alert("Заповніть поля!");

            const res = await fetch(`${API_URL}/order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if(result.success) {
                alert("Успішно!");
                window.location.href = "index.html";
            } else {
                alert(result.error);
            }
        }

        window.onload = async () => {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(user) {
                const res = await fetch(`${API_URL}/get_balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email })
                });
                const data = await res.json();
                document.getElementById('balance-display').innerText = (data.balance || 0) + " ₴";
            }
        };
    </script>
</body>
</html>
