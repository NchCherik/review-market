<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket - Регистрация</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .input-custom { width: 100%; background: white; border: 1px solid #f3f4f6; padding: 1.25rem 2rem; border-radius: 1.5rem; outline: none; margin-bottom: 1rem; }
        .input-custom:focus { border-color: #4f46e5; }
    </style>
</head>
<body class="bg-[#f9fafb] font-sans text-gray-900 min-h-screen flex flex-col">
    <header class="p-6">
        <div onclick="window.location.href='index.html'" class="cursor-pointer inline-flex items-center gap-2">
            <div class="bg-[#4f46e5] w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">R</div>
            <span class="font-bold">Назад на главную</span>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-gray-100">
            <h1 class="text-3xl font-extrabold mb-8">Регистрация</h1>
            <form onsubmit="event.preventDefault(); registerUser();">
                <input type="text" id="username" placeholder="Логин" class="input-custom" required>
                <input type="email" id="email" placeholder="Email" class="input-custom" required>
                <input type="password" id="password" placeholder="Пароль" class="input-custom" required>
                <button type="submit" id="regBtn" class="w-full bg-black text-white font-bold py-5 rounded-3xl shadow-lg hover:bg-[#4f46e5] transition-all">Создать аккаунт</button>
            </form>
        </div>
    </main>

    <script>
        async function registerUser() {
            const btn = document.getElementById('regBtn');
            btn.innerText = 'Создаем...';
            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            try {
                const res = await fetch('https://review-market.onrender.com/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(userData)
                });
                if(res.ok) {
                    alert('Регистрация прошла успешно!');
                    window.location.href = 'index.html';
                } else {
                    const result = await res.json();
                    alert(result.message || 'Ошибка');
                }
            } catch(e) { alert('Сервер не отвечает'); }
            btn.innerText = 'Создать аккаунт';
        }
    </script>
</body>
</html>
