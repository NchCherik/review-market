<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #ffffff; }
        .italic-black { font-weight: 900; font-style: italic; }
    </style>
</head>
<body class="text-gray-900">

    <header class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-black rounded-lg flex items-center justify-center">
                <span class="text-white text-2xl italic-black">R</span>
            </div>
            <h1 class="text-2xl italic-black tracking-tighter uppercase">ReviewMarket</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="balance-area" class="hidden flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-full border border-gray-200">
                <span id="user-balance" class="text-indigo-600 italic-black text-sm">0 ₴</span>
                <button onclick="adminTopUp()" class="w-6 h-6 bg-indigo-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-indigo-600">+</button>
            </div>
            <button id="login-btn" onclick="login()" class="flex items-center gap-2 bg-white border border-gray-200 px-4 py-2 rounded-full shadow-sm hover:bg-gray-50 transition-all">
                <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white text-xs italic-black">S</div>
                <span class="text-xs italic-black uppercase">Увійти</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20 text-center">
        <h2 class="text-7xl italic-black uppercase leading-none mb-4 tracking-tighter">
            Керуй своєю<br>
            <span class="text-indigo-600">репутацією</span>
        </h2>
        <p class="text-gray-400 font-medium max-w-2xl mx-auto mb-16">
            Професійне просування на картах та у месенджерах.<br>
            Безпечно. Швидко. З гарантією результату.
        </p>

        <div class="flex justify-center">
            <div class="bg-white p-10 rounded-[40px] shadow-[0_20px_60px_rgba(0,0,0,0.05)] border border-gray-100 max-w-sm w-full text-left">
                <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center mb-10">
                    <svg class="w-6 h-6 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                </div>
                <h3 class="text-3xl italic-black uppercase mb-4 tracking-tight">Google Карти</h3>
                <p class="text-gray-400 text-sm font-semibold mb-10 leading-relaxed">
                    Відгуки 5★ з гарантією від видалення. Покращимо рейтинг вашого бізнесу за лічені дні.
                </p>
                <a href="G.html" class="block w-full bg-[#5c5cf0] text-white text-center py-4 rounded-2xl italic-black uppercase tracking-widest text-sm hover:opacity-90 transition-all">
                    Купити відгуки
                </a>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";

        function login() {
            const email = prompt("Введіть ваш Email:");
            if (email) {
                localStorage.setItem('rm_user', JSON.stringify({ email: email }));
                checkUser();
            }
        }

        async function checkUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if (user) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('balance-area').classList.remove('hidden');
                
                try {
                    const res = await fetch(`${API_URL}/get_balance`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: user.email })
                    });
                    const data = await res.json();
                    document.getElementById('user-balance').innerText = (data.balance || 0) + " ₴";
                } catch(e) { console.error("Balance fetch failed"); }
            }
        }

        async function adminTopUp() {
            const pass = prompt("Пароль:");
            const email = prompt("Email:");
            const amount = prompt("Сума:");
            if(!pass || !email || !amount) return;

            const res = await fetch(`${API_URL}/admin/topup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass, email: email, amount: parseFloat(amount) })
            });
            const result = await res.json();
            if (result.success) { alert("Баланс оновлено!"); checkUser(); }
            else { alert("Помилка: " + result.error); }
        }

        window.onload = checkUser;
    </script>
</body>
</html>
