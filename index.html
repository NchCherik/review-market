<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket | Головна</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f9fafb; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .font-black { font-weight: 900; }
        
        /* Фикс для кнопки Google на мобилках */
        #auth-section iframe {
            max-width: 100% !important;
            transform: scale(0.9);
            transform-origin: right;
        }

        .review-side {
            filter: grayscale(100%);
            opacity: 0.4;
            transform: scale(0.9);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .review-side:hover {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(0.95);
        }

        @keyframes pulse-indigo {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(99, 102, 241, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .animate-pulse-custom { animation: pulse-indigo 2s infinite; }
    </style>
</head>
<body class="text-gray-900">

    <div id="adminModal" class="modal items-center justify-center p-4">
        <div class="bg-gray-900 text-white p-6 md:p-8 rounded-[30px] md:rounded-[40px] max-w-xs w-full shadow-2xl border border-gray-700">
            <h3 class="text-lg font-black mb-4 uppercase italic text-indigo-400">Admin Control</h3>
            <input type="password" id="admPass" placeholder="Пароль" class="w-full bg-gray-800 p-4 rounded-2xl mb-3 text-sm border border-gray-700 text-white focus:outline-none">
            <input type="number" id="admAmount" placeholder="Сума ₴" class="w-full bg-gray-800 p-4 rounded-2xl mb-4 text-sm border border-gray-700 text-white focus:outline-none">
            <button onclick="executeTopUp()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase text-xs hover:bg-indigo-500 transition-all">Нарахувати</button>
            <button onclick="document.getElementById('adminModal').style.display='none'" class="w-full text-gray-500 text-[10px] mt-6 uppercase font-black text-center">Закрити</button>
        </div>
    </div>

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
            <div class="flex items-center gap-1.5 shrink-0">
                <div class="w-7 h-7 bg-black rounded-lg flex items-center justify-center shadow-lg relative cursor-pointer">
                    <span class="text-white font-black text-lg italic">R</span>
                    <div onclick="document.getElementById('adminModal').style.display='flex'" class="absolute inset-0 z-50 opacity-0"></div>
                </div>
                <h1 class="font-black text-sm md:text-xl tracking-tighter uppercase italic">ReviewMarket</h1>
            </div>

            <div class="flex items-center gap-2 md:gap-4">
                <div class="flex items-center bg-gray-50 px-2.5 py-1.5 rounded-full border border-gray-200 shadow-sm shrink-0">
                    <span id="user-balance" class="font-black text-[10px] md:text-sm mr-1 text-indigo-600">0 ₴</span>
                    <div class="w-4 h-4 md:w-5 md:h-5 bg-indigo-500 text-white rounded-full flex items-center justify-center shadow-md opacity-50">
                        <span class="text-[9px] font-bold">+</span>
                    </div>
                </div>
                
                <div id="auth-section" class="flex items-center justify-end min-w-[120px]">
                    </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 md:py-16">
        <div class="text-center mb-10 md:mb-16">
            <a href="Perevagi.html" class="inline-flex items-center gap-2 bg-white border border-gray-100 px-5 py-2 rounded-full shadow-sm hover:scale-105 transition-all mb-6 group">
                <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse-custom"></span>
                <span class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-600">Переваги</span>
            </a>
            <h2 class="text-4xl md:text-8xl font-black mb-4 tracking-tighter leading-tight uppercase italic">Керуй своєю <br><span class="text-indigo-600">репутацією</span></h2>
        </div>

        <div class="flex flex-col lg:flex-row items-center justify-center gap-6 mt-8">
            <div class="review-side hidden lg:block bg-white p-6 rounded-[35px] border border-gray-100 shadow-sm w-72 flex-shrink-0">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-[10px] font-black">A</div>
                    <span class="font-black text-[10px] uppercase">Артем В.</span>
                </div>
                <p class="text-[11px] text-gray-500 italic">"Замовив 10 відгуків. Все ок."</p>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-[35px] md:rounded-[45px] border border-gray-100 shadow-2xl group max-w-md w-full border-b-4 border-b-indigo-500">
                <div class="w-14 h-14 bg-green-50 text-green-500 rounded-2xl flex items-center justify-center mb-6">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </div>
                <h3 class="text-2xl font-black mb-3 italic uppercase italic">Google Карти</h3>
                <a href="G.html" class="inline-block bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black text-xs hover:bg-indigo-700 transition-all uppercase italic tracking-widest w-full text-center">Купити відгуки</a>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";
        const CLIENT_ID = "870765995654-qp38thfph22ubnjgknabmnd3dusgueij.apps.googleusercontent.com";

        function onGoogleAuth(response) {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const user = JSON.parse(window.atob(base64));
            localStorage.setItem('rm_user', JSON.stringify({ name: user.name, email: user.email, picture: user.picture }));
            location.reload();
        }

        async function fetchBalance(email, name) {
            try {
                const res = await fetch(`${API_URL}/get_balance`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email, name: name })
                });
                const data = await res.json();
                return data.balance;
            } catch (e) { return 0; }
        }

        function initGoogleBtn() {
            if (window.google && window.google.accounts) {
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: onGoogleAuth
                });
                google.accounts.id.renderButton(
                    document.getElementById("auth-section"),
                    { theme: "outline", size: "medium", shape: "pill", type: "standard", width: "120" }
                );
            } else {
                // Если Google еще не загрузился, проверяем снова через 200мс
                setTimeout(initGoogleBtn, 200);
            }
        }

        async function renderUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            const balanceElement = document.getElementById('user-balance');
            const authSection = document.getElementById('auth-section');

            if (user) {
                balanceElement.innerText = "... ₴";
                const balance = await fetchBalance(user.email, user.name);
                balanceElement.innerText = balance + " ₴";
                authSection.innerHTML = `
                    <div class="flex items-center gap-1.5 bg-white border border-gray-200 px-2 py-1 rounded-full shadow-sm">
                        <img src="${user.picture}" class="w-5 h-5 rounded-full">
                        <span class="font-black text-[9px] uppercase italic text-black truncate max-w-[50px]">${user.name.split(' ')[0]}</span>
                        <button onclick="logout()" class="text-[8px] text-red-400 font-black ml-1 uppercase">Exit</button>
                    </div>`;
            } else {
                initGoogleBtn();
            }
        }

        function logout() { 
            localStorage.removeItem('rm_user'); 
            location.reload(); 
        }

        window.onload = renderUser;

        async function executeTopUp() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            const pass = document.getElementById('admPass').value;
            const amountInput = document.getElementById('admAmount').value;
            if(!user) return;
            try {
                const res = await fetch(`${API_URL}/admin/topup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password: pass, amount: Math.round(parseFloat(amountInput)), email: user.email })
                });
                const data = await res.json();
                if(data.success) { location.reload(); }
            } catch (e) { alert("Admin Error"); }
        }
    </script>
</body>
</html>
