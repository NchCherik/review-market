<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket | Главная</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f9fafb; 
        }
        .font-black { font-weight: 900; }
        
        /* Твоя плавная анимация карточек */
        .service-card {
            transition: all 0.3s ease;
        }
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center">
                    <span class="text-white font-black text-xl italic">R</span>
                </div>
                <h1 class="font-black text-xl tracking-tighter uppercase italic">ReviewMarket</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="balance-display" class="hidden font-black text-indigo-600 bg-indigo-50 px-5 py-2 rounded-full border border-indigo-100 text-sm">
                    0 ₴
                </div>
                <button id="login-btn" onclick="login()" class="bg-black text-white px-6 py-2 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-gray-800 transition-all">
                    Увійти
                </button>
                <button onclick="adminTopUp()" class="opacity-0 hover:opacity-100 transition-opacity text-[10px] font-bold text-gray-300">ADMIN</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-20">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-black mb-4 uppercase italic tracking-tighter">
                Наші <span class="text-indigo-600">Послуги</span>
            </h2>
            <p class="text-gray-400 font-bold uppercase text-[10px] tracking-[0.3em]">Оберіть сервіс для замовлення</p>
        </div>

        <div class="flex justify-center">
            
            <a href="G.html" class="service-card block w-full max-w-sm bg-white p-10 rounded-[40px] border-2 border-gray-100 text-center">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-100">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
                <h3 class="text-2xl font-black mb-2 uppercase italic tracking-tighter">Google Maps</h3>
                <p class="text-gray-400 text-xs font-bold uppercase mb-6 tracking-widest">Відгуки • 30 ₴</p>
                <div class="bg-gray-50 text-black py-4 rounded-2xl font-black uppercase italic tracking-widest text-[10px] group-hover:bg-black group-hover:text-white transition-all">
                    Перейти
                </div>
            </a>

        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";

        function login() {
            const email = prompt("Введіть ваш Email:");
            if (email) {
                localStorage.setItem('rm_user', JSON.stringify({ email: email }));
                checkUser();
            }
        }

        async function checkUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if (user) {
                document.getElementById('login-btn').classList.add('hidden');
                const balDisp = document.getElementById('balance-display');
                balDisp.classList.remove('hidden');
                
                try {
                    const res = await fetch(`${API_URL}/get_balance`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: user.email })
                    });
                    const data = await res.json();
                    balDisp.innerText = (data.balance || 0) + " ₴";
                } catch(e) { console.log("Ошибка баланса"); }
            }
        }

        // Твоя админка
        async function adminTopUp() {
            const pass = prompt("Admin Password:");
            const email = prompt("User Email:");
            const amount = prompt("Amount (UAH):");

            if(!pass || !email || !amount) return;

            const response = await fetch(`${API_URL}/admin/topup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: pass,
                    email: email,
                    amount: parseFloat(amount)
                })
            });

            const result = await response.json();
            if (result.success) {
                alert("Готово! Новый баланс: " + result.new_balance);
                checkUser();
            } else {
                alert("Ошибка: " + result.error);
            }
        }

        window.onload = checkUser;
    </script>
</body>
</html>
