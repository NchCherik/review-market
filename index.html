<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket - Главная</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { accent: '#0088cc', bgMain: '#f9fafb' }
                }
            }
        }
    </script>
</head>
<body class="bg-bgMain font-sans text-gray-900">
    <header class="w-full bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div onclick="window.location.href='index.html'" class="cursor-pointer flex items-center gap-2">
                <div class="bg-accent w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold">R</div>
                <span class="font-bold text-gray-900 text-xl tracking-tighter">ReviewMarket</span>
            </div>

            <div class="flex items-center gap-4">
                <div class="bg-gray-100 text-gray-700 px-4 py-2 rounded-full font-bold text-sm border border-gray-200">
                    <span id="user-balance">0</span> ₽
                </div>

                <div id="auth-section">
                    <div id="g_id_onload"
                         data-client_id="870765995654-qp38thfph22ubnjgknabmnd3dusgueij.apps.googleusercontent.com"
                         data-callback="onGoogleAuth">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto p-6 text-center mt-10">
        <h1 class="text-3xl font-bold mb-4">Добро пожаловать в ReviewMarket</h1>
        <p class="text-gray-600 mb-8">Лучшие отзывы для вашего бизнеса</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="window.location.href='tg.html'" class="p-6 bg-white rounded-2xl shadow-sm border hover:shadow-md transition-shadow">
                <span class="text-2xl mb-2 block">🔹</span>
                <span class="font-bold">Telegram Отзывы</span>
            </button>
            <button onclick="window.location.href='google.html'" class="p-6 bg-white rounded-2xl shadow-sm border hover:shadow-md transition-shadow">
                <span class="text-2xl mb-2 block">🔸</span>
                <span class="font-bold">Google Отзывы</span>
            </button>
        </div>
    </main>

    <script>
        function onGoogleAuth(response) {
            // Декодируем данные пользователя
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const user = JSON.parse(window.atob(base64));

            // Сохраняем в браузере
            localStorage.setItem('rm_user', JSON.stringify({
                name: user.name,
                email: user.email,
                picture: user.picture
            }));
            
            // Уведомляем сервер (твой app.py на Render)
            fetch('https://review-market.onrender.com/auth-google', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: user.email, name: user.name })
            });

            renderUser();
        }

        function renderUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(user) {
                document.getElementById('auth-section').innerHTML = `
                    <div class="flex items-center gap-3 bg-gray-50 border px-3 py-1 rounded-full shadow-inner">
                        <img src="${user.picture}" class="w-7 h-7 rounded-full border border-white">
                        <span class="font-semibold text-sm text-gray-700">${user.name.split(' ')[0]}</span>
                        <button onclick="logout()" class="text-[10px] text-red-400 hover:text-red-600 font-bold uppercase tracking-tighter">Выйти</button>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('rm_user');
            location.reload();
        }

        window.onload = renderUser;
    </script>
</body>
</html>
