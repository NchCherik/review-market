<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-custom { transition: all 0.3s ease; cursor: pointer; }
        .card-custom:hover { transform: translateY(-5px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body class="bg-[#f9fafb] min-h-screen flex flex-col">

    <header class="w-full bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div onclick="window.location.href='index.html'" class="cursor-pointer flex items-center gap-2">
                <div class="bg-[#0088cc] w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold text-lg">R</div>
                <span class="font-black text-gray-950 text-xl tracking-tighter">ReviewMarket</span>
            </div>

            <div class="flex items-center gap-4">
                <div class="bg-gray-50 text-gray-700 px-5 py-2 rounded-full font-bold text-sm border border-gray-200 shadow-inner">
                    <span id="user-balance">0</span> ₽
                </div>

                <div id="auth-section">
                    <div id="g_id_onload"
                         data-client_id="870765995654-qp38thfph22ubnjgknabmnd3dusgueij.apps.googleusercontent.com"
                         data-callback="onGoogleAuth">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
        
        <div class="bg-white px-12 py-7 rounded-[2.5rem] shadow-xl shadow-gray-100/50 mb-16 border border-gray-50">
            <h1 class="text-5xl md:text-6xl font-black tracking-tight text-gray-900">
                <span class="text-indigo-600">Отзывы.</span> Навсегда.
            </h1>
        </div>

        <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl">
            
            <div onclick="window.location.href='tg.html'" class="card-custom flex-1 bg-white p-14 rounded-[2.5rem] shadow-lg shadow-gray-200/50 flex flex-col items-center justify-center border border-gray-50">
                <div class="w-16 h-16 bg-sky-50 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-8 h-8 text-sky-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-1.897 8.942c-.143.64-.521.797-1.058.496l-2.887-2.128-1.392 1.339c-.155.155-.283.283-.58.283l.206-2.934 5.339-4.825c.232-.206-.051-.32-.36-.114l-6.598 4.155-2.844-.889c-.618-.192-.63-.618.129-.914l11.107-4.281c.514-.192.964.114.775.866z"/></svg>
                </div>
                <span class="text-xl font-black text-gray-900">Отзывы Телеграмм</span>
            </div>

            <div onclick="window.location.href='G.html'" class="card-custom flex-1 bg-white p-14 rounded-[2.5rem] shadow-lg shadow-gray-200/50 flex flex-col items-center justify-center border border-gray-50">
                <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-6">
                    <span class="text-red-500 text-3xl font-black">G</span>
                </div>
                <span class="text-xl font-black text-gray-900">Отзывы Гугл</span>
            </div>

        </div>
    </main>

    <script>
        function onGoogleAuth(response) {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const user = JSON.parse(window.atob(base64));

            localStorage.setItem('rm_user', JSON.stringify({
                name: user.name,
                picture: user.picture,
                email: user.email
            }));
            
            fetch('https://review-market.onrender.com/auth-google', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: user.email, name: user.name })
            });

            renderUser();
        }

        function renderUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if(user) {
                document.getElementById('auth-section').innerHTML = `
                    <div class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-2 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                        <img src="${user.picture}" class="w-6 h-6 rounded-full border border-gray-100">
                        <span class="font-bold text-sm text-gray-800">${user.name.split(' ')[0]}</span>
                        <button onclick="logout()" class="text-[10px] text-red-500 font-black uppercase tracking-tighter ml-1">Выход</button>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('rm_user');
            location.reload();
        }

        window.onload = renderUser;
    </script>
</body>
</html>
