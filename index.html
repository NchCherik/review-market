<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket | Головна</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f9fafb; 
        }
        .font-black { font-weight: 900; }
        
        /* Анімація появи */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .service-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .service-card:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="text-gray-900">

    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-2xl italic">R</span>
                </div>
                <h1 class="font-black text-2xl tracking-tighter uppercase italic">ReviewMarket</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="balance-container" class="hidden flex items-center gap-3">
                    <div id="user-balance" class="font-black text-indigo-600 bg-indigo-50 px-6 py-2.5 rounded-full border border-indigo-100 text-sm shadow-inner">
                        0 ₴
                    </div>
                    <button onclick="adminTopUp()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-black hover:text-white transition-all">
                        🛠
                    </button>
                </div>
                <button id="login-btn" onclick="login()" class="bg-black text-white px-8 py-3 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-gray-800 transition-all shadow-xl shadow-gray-200">
                    Увійти
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-20 min-h-[80vh] flex flex-col justify-center">
        
        <div class="text-center mb-16 fade-in">
            <h2 class="text-6xl font-black mb-6 uppercase italic tracking-tighter leading-none">
                Просувай свій <br> <span class="text-indigo-600">бізнес чесно.</span>
            </h2>
            <p class="text-gray-400 font-bold uppercase text-xs tracking-[0.4em]">Оберіть сервіс для старту</p>
        </div>

        <div class="flex justify-center fade-in" style="animation-delay: 0.2s;">
            <a href="G.html" class="service-card group relative w-full max-w-md bg-white p-12 rounded-[60px] border border-gray-100 shadow-2xl shadow-gray-200/50 overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-50 rounded-full blur-3xl group-hover:bg-indigo-100 transition-colors"></div>
                
                <div class="relative z-10 text-center">
                    <div class="inline-flex w-20 h-20 bg-indigo-600 rounded-[28px] items-center justify-center mb-8 shadow-xl shadow-indigo-200 group-hover:rotate-6 transition-transform">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                    
                    <h3 class="text-4xl font-black mb-4 uppercase italic tracking-tighter">Google Maps</h3>
                    <p class="text-gray-500 font-medium mb-8 leading-relaxed">Якісні та живі відгуки, що піднімуть ваш рейтинг у ТОП пошуку.</p>
                    
                    <div class="inline-flex items-center gap-2 bg-black text-white px-10 py-5 rounded-3xl font-black uppercase italic tracking-widest text-sm group-hover:bg-indigo-600 transition-all">
                        Замовити
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                    </div>
                </div>
            </a>
        </div>

        <div class="mt-20 text-center text-gray-300 font-black uppercase text-[10px] tracking-[0.5em] fade-in" style="animation-delay: 0.4s;">
            ReviewMarket © 2026 • Vinnytsia, Ukraine
        </div>

    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";

        // ЛОГІКА АВТОРИЗАЦІЇ (GOOGLE ИЛИ SIMPLE)
        function login() {
            const email = prompt("Введіть ваш Email для входу:");
            if (email) {
                const user = { email: email, name: "Клієнт" };
                localStorage.setItem('rm_user', JSON.stringify(user));
                checkUser();
            }
        }

        async function checkUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if (user) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('balance-container').classList.remove('hidden');
                
                // Запит балансу
                const res = await fetch(`${API_URL}/get_balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email })
                });
                const data = await res.json();
                document.getElementById('user-balance').innerText = (data.balance || 0) + " ₴";
            }
        }

        async function adminTopUp() {
            const pass = prompt("Пароль адміна:");
            const email = prompt("Email користувача:");
            const amount = prompt("Сума поповнення:");

            if(!pass || !email || !amount) return;

            const response = await fetch(`${API_URL}/admin/topup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: pass,
                    email: email,
                    amount: parseFloat(amount)
                })
            });

            const result = await response.json();
            if (result.success) {
                alert("Успішно! Новий баланс: " + result.new_balance + " ₴");
                checkUser();
            } else {
                alert("Помилка: " + result.error);
            }
        }

        window.onload = checkUser;
    </script>
</body>
</html>
