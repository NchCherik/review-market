<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #ffffff; }
        .italic-black { font-weight: 900; font-style: italic; }
        .admin-trigger { cursor: pointer; }
    </style>
</head>
<body class="text-gray-900">

    <header class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
        <div class="flex items-center gap-2 admin-trigger" onclick="adminTopUp()">
            <div class="w-10 h-10 bg-black rounded-lg flex items-center justify-center">
                <span class="text-white text-2xl italic-black">R</span>
            </div>
            <h1 class="text-2xl italic-black tracking-tighter uppercase">ReviewMarket</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="google-login-btn" onclick="login()" class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-2 rounded-lg shadow-sm hover:shadow-md transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                <span class="text-sm font-bold text-gray-600">Увійти через Google</span>
            </button>

            <div id="user-area" class="hidden flex items-center gap-4">
                <div class="bg-gray-50 px-5 py-2 rounded-full border border-gray-100 flex items-center gap-2">
                    <span id="user-balance" class="text-[#5c5cf0] italic-black text-sm">0 ₴</span>
                    <div class="w-5 h-5 bg-[#5c5cf0] text-white rounded-full text-[10px] flex items-center justify-center">+</div>
                </div>

                <div class="flex items-center gap-3 bg-white border border-gray-100 px-4 py-1.5 rounded-full shadow-sm">
                    <div class="w-8 h-8 bg-[#8bc34a] rounded-full flex items-center justify-center text-white text-xs italic-black">S</div>
                    <div class="text-left">
                        <p class="text-[10px] italic-black uppercase leading-none text-gray-900">Serhii</p>
                        <button onclick="logout()" class="text-[8px] font-bold uppercase text-red-500 leading-none">Вихід</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20 text-center">
        <h2 class="text-[80px] italic-black uppercase leading-[0.9] mb-6 tracking-tighter">
            Керуй своєю<br>
            <span class="text-[#5c5cf0]">репутацією</span>
        </h2>
        <p class="text-gray-400 font-bold uppercase text-[11px] tracking-[0.2em] mb-16">
            Професійне просування на картах та у месенджерах.<br>
            Безпечно. Швидко. З гарантією результату.
        </p>

        <div class="flex justify-center">
            <div class="bg-white p-12 rounded-[50px] shadow-[0_30px_80px_rgba(0,0,0,0.06)] border border-gray-50 max-w-sm w-full text-left">
                <div class="w-14 h-14 bg-green-50 rounded-2xl flex items-center justify-center mb-10">
                    <svg class="w-7 h-7 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <h3 class="text-3xl italic-black uppercase mb-4 tracking-tighter">Google Карти</h3>
                <p class="text-gray-400 text-sm font-semibold mb-10 leading-relaxed">
                    Відгуки 5★ з гарантією від видалення. Покращимо рейтинг вашого бізнесу за лічені дні.
                </p>
                <a href="G.html" class="block w-full bg-[#5c5cf0] text-white text-center py-5 rounded-2xl italic-black uppercase tracking-[0.1em] text-sm hover:bg-[#4a4ad4] transition-all">
                    Купити відгуки
                </a>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://review-market.onrender.com";

        function login() {
            const email = prompt("Введіть ваш Google Email:");
            if (email) {
                localStorage.setItem('rm_user', JSON.stringify({ email: email, name: "Serhii" }));
                checkUser();
            }
        }

        function logout() {
            localStorage.removeItem('rm_user');
            location.reload();
        }

        async function checkUser() {
            const user = JSON.parse(localStorage.getItem('rm_user'));
            if (user) {
                document.getElementById('google-login-btn').classList.add('hidden');
                document.getElementById('user-area').classList.remove('hidden');
                
                try {
                    const res = await fetch(`${API_URL}/get_balance`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: user.email })
                    });
                    const data = await res.json();
                    document.getElementById('user-balance').innerText = (data.balance || 0) + " ₴";
                } catch(e) { console.error("Balance Error"); }
            }
        }

        async function adminTopUp() {
            const pass = prompt("Пароль:");
            if(!pass) return;
            const email = prompt("Email:");
            const amount = prompt("Сума:");
            if(!email || !amount) return;

            const res = await fetch(`${API_URL}/admin/topup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass, email: email, amount: parseFloat(amount) })
            });
            const result = await res.json();
            if (result.success) { alert("Успіх!"); checkUser(); }
            else { alert("Помилка!"); }
        }

        window.onload = checkUser;
    </script>
</body>
</html>
